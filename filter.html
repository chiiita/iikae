<head>

<title>コメント翻訳機｜アンチの暴言を、要は何かに翻訳（SNSアンチ対策）</title>
<meta name="description" content="SNSのアンチ・誹謗中傷コメントを貼ると、汚い言葉を伏せ字にし、攻撃の型を判定して『要は何が言いたいか』に翻訳。受け取る価値があるか（スルー推奨か）も提示。完全ブラウザ内処理・AI不使用。">

<meta property="og:description" content="アンチコメントを貼ると、暴言を伏せ字に＋『要はこういうこと』に翻訳＋スルー判定。気分を守る防御ツール。">

<style>
  :root{--bg:#FAF9F6;--card:#FFFFFF;--ink:#1A1A1A;--ink-soft:#534E47;--sub:#8A857E;--rule:#E7E3DC;--rule-soft:#F0EDE6;
    --gold:#9C6B3F;--gold-tint:#F3EBE0;--radius:8px;--serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;--soft:#5b9b6f;--soft-tint:#EAF3EC;--warn:#C2664F;--warn-tint:#F7ECEC;}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.85;font-size:16px;letter-spacing:.012em;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .wrap{max-width:680px;margin:0 auto;padding:0 22px 90px}
  .nav{display:flex;justify-content:center;gap:18px;padding:18px 0 0;font-size:.78rem}
  .nav a{color:var(--sub);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px}
  .nav a.cur{color:var(--ink);border-color:var(--gold);font-weight:700}
  .nav a:hover{color:var(--gold)}
  header.hero{text-align:center;padding:34px 8px 18px}
  .kicker{font-size:.7rem;letter-spacing:.3em;color:var(--gold);font-weight:500;margin:0 0 14px;text-indent:.3em}
  .hero h1{font-family:var(--serif);font-weight:700;font-size:1.7rem;line-height:1.5;margin:0 0 12px;letter-spacing:.02em}
  .hero p{color:var(--ink-soft);font-size:.88rem;margin:0}
  .hr-deco{width:40px;height:1px;background:var(--gold);margin:16px auto;opacity:.7}

  .panel{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);padding:22px;margin:16px 0}
  .lbl{font-size:.8rem;color:var(--sub);font-weight:700;letter-spacing:.04em;margin:0 0 10px}
  textarea{width:100%;min-height:120px;border:1.5px solid var(--rule);border-radius:10px;padding:14px;font-size:1rem;font-family:var(--sans);color:var(--ink);line-height:1.8;resize:vertical;background:#fff}
  textarea::placeholder{color:#C3BDB3} textarea:focus{outline:none;border-color:var(--gold)}
  .row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .btn{border:1px solid var(--rule);background:#fff;border-radius:999px;padding:9px 18px;font-size:.82rem;font-family:var(--sans);color:var(--ink-soft);cursor:pointer;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}

  .verdict{border-radius:var(--radius);padding:15px 18px;margin:16px 0 10px;font-size:.92rem;line-height:1.8}
  .verdict.clean{background:var(--soft-tint);border:1px solid #cfe6d7;color:#2f6b46}
  .verdict.some{background:var(--gold-tint);border:1px solid #E6D6C2;color:#7A4F2C}
  .verdict.heavy{background:var(--warn-tint);border:1px solid #ecd5cf;color:#9a3f2c}
  .verdict .vlabel{font-family:var(--serif);font-weight:700;font-size:1rem}
  .verdict .judge{font-weight:700}
  .verdict .meta{font-size:.76rem;opacity:.85;margin-top:4px}
  .catchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .catchip{font-size:.7rem;background:rgba(255,255,255,.6);border:1px solid var(--rule);border-radius:999px;padding:2px 9px;color:var(--ink-soft)}

  .blk{background:#fff;border:1px solid var(--rule);border-radius:var(--radius);padding:16px 18px;margin:10px 0;font-size:.92rem;line-height:1.85}
  .blk .th{font-family:var(--serif);color:var(--gold);font-weight:600;display:block;margin-bottom:6px;font-size:.82rem;letter-spacing:.04em}
  .blk.sample .body{color:var(--ink);background:var(--gold-tint);border-radius:6px;padding:8px 12px;display:inline-block}
  .topicwords{color:var(--ink);font-weight:700}

  .out-h{margin:18px 2px 8px}
  .out-h .t{font-family:var(--serif);font-weight:700;font-size:1rem}
  .out{background:#fff;border:1px solid var(--rule);border-radius:var(--radius);padding:18px;font-size:1rem;line-height:1.95;white-space:pre-wrap;word-break:break-word}
  .masked{background:var(--rule-soft);color:#B3ABA0;border-radius:4px;padding:0 6px;font-weight:600;letter-spacing:.05em}
  .raw-toggle{font-size:.76rem;color:var(--sub);text-align:center;margin:14px 0 0;cursor:pointer;text-decoration:underline}
  .raw{display:none;background:#fff;border:1px dashed var(--rule);border-radius:var(--radius);padding:16px;margin-top:10px;font-size:.92rem;line-height:1.9;white-space:pre-wrap;word-break:break-word;color:var(--ink-soft)}

  .care{border:1px solid var(--rule);border-radius:var(--radius);padding:18px 20px;margin:22px 0;font-size:.82rem;color:var(--ink-soft);line-height:1.95}
  .care .h{font-family:var(--serif);color:var(--gold);font-weight:600;display:block;margin-bottom:8px;font-size:.88rem}
  .care b{color:var(--ink)}
  footer{text-align:center;color:var(--sub);font-size:.7rem;margin-top:30px;line-height:2}
  .foot-rule{width:30px;height:1px;background:var(--rule);margin:0 auto 16px}
  @media(max-width:480px){.wrap{padding:0 16px 80px}.hero h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="index.html">言い換えメーカー</a>
    <a href="filter.html" class="cur">コメント翻訳機</a>
  </nav>

  <header class="hero">
    <p class="kicker">COMMENT HONYAKU</p>
    <h1>コメント翻訳機</h1>
    <div class="hr-deco"></div>
    <p>アンチの暴言を貼ると、<b>汚い言葉を伏せて</b>＋<b>「要は何が言いたいか」に翻訳</b>。<br>受け取る価値があるか（スルーでいいか）まで教えます。</p>
  </header>

  <div class="panel">
    <p class="lbl">気になるコメントを貼り付け</p>
    <textarea id="inp" placeholder="ここにSNSのコメントを貼り付け…（外部に送信されません。すべてあなたの端末内で処理されます）"></textarea>
    <div class="row">
      <button class="btn primary" id="run">翻訳して見る</button>
      <button class="btn" id="clear">クリア</button>
    </div>
  </div>

  <div id="result"></div>

  <div class="care">
    <span class="h">読む前に</span>
    悪意だけの言葉は、<b>あなたの価値とは関係ありません</b>。翻訳で「中身がある」と出た所だけ拾って、なければ<b>そっと閉じてOK</b>。<br>
    つらいときは、無理に読まない・ミュート/ブロック・通報・信頼できる人に話す——どれも正しい選択です。
  </div>

  <footer>
    <div class="foot-rule"></div>
    コメント翻訳機 ｜ お悩み解決ツール<br>
    AIは使っていません。すべてブラウザ内で処理され、コメントは外部に送信されません。
  </footer>
</div>

<script src="data/badwords.js"></script>
<script>
(function(){
  const $=id=>document.getElementById(id);
  const esc=s=>String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
  const seen=new Set();
  const WORDS=(typeof BADWORDS!=='undefined'?BADWORDS:[]).filter(x=>{if(seen.has(x.w))return false;seen.add(x.w);return !!x.w;}).sort((a,b)=>b.w.length-a.w.length);
  const SENT=" ";

  // 改善のヒントになり得る「トピック語」
  const TOPICS=["音量","音","画質","解像度","テンポ","間延び","長すぎ","長い","短い","前置き","オチ","構成","編集","カット","字幕","テロップ","BGM","声","滑舌","早口","内容","中身","薄い","浅い","雑","分かりにくい","わかりにくい","説明不足","説明","情報","古い","間違い","誤り","事実","根拠","ソース","タイトル","サムネ","話し方","テーマ","ネタ"];

  // 攻撃の型（上から優先判定）
  const TYPES=[
    {key:"quality",label:"内容・クオリティへの不満",judge:"参考程度に拾う",cls:"some",
      test:(t,cc)=>TOPICS.some(w=>t.includes(w)),
      yaku:"言い方はきついけど、作りについて何か引っかかった可能性。下に拾った点だけ、改善のヒントになるか見てみて。",
      sample:"ここがもう少し良くなると、さらに見やすいと感じました。"},
    {key:"mount",label:"上から目線・マウント",judge:"トーンは無視、中身だけ",cls:"some",
      test:(t,cc)=>/常識|普通は|普通だろ|普通そう|にわか|勉強しろ|知らないの|当たり前|素人|レベル低/.test(t),
      yaku:"態度は上からだけど、知識面のヒントが混じってることも。言い方は受け流して、事実の指摘だけ拾えばOK。",
      sample:"◯◯という見方もあるよ、と共有させてください。"},
    {key:"ability",label:"能力・才能の否定",judge:"真に受けすぎない",cls:"some",
      test:(t,cc)=>/才能|向いて|センス|無能|下手/.test(t),
      yaku:"『もっと良くできるはず』の乱暴な裏返しかも。ただ具体的な改善点は書かれていないので、真に受けすぎなくてOK。",
      sample:"伸びしろを感じたので、次回作も楽しみにしています。"},
    {key:"reject",label:"全否定・突き放し",judge:"スルー推奨",cls:"heavy",
      test:(t,cc)=>/やめ|引退|二度と|需要ない|オワコン|いらない|来るな|来んな|消え/.test(t),
      yaku:"強い言葉で突き放してるだけで、中身はほぼ無し。あなたを下げて気持ちよくなりたいタイプの可能性。距離を置いてOK。",
      sample:"自分には少し合わなかったかな、と感じました。"},
    {key:"person",label:"容姿・人格への攻撃",judge:"スルー推奨",cls:"heavy",
      test:(t,cc)=>!!(cc["容姿"]||cc["人格・存在否定"]||cc["下品・性的"]),
      yaku:"作品ではなく『あなた個人』を攻撃してるだけ。内容とは無関係。受け取る必要はまったくありません。",
      sample:"（これは正当な指摘ではありません）"},
    {key:"troll",label:"煽り・荒らし",judge:"反応しないのが一番",cls:"heavy",
      test:(t,cc)=>/草|ｗｗ|ww|くだらな|しょうも|暇人|効いてる|釣り|かまって/.test(t),
      yaku:"反応を見て楽しむタイプ。一番効くのは『無反応』。ミュート/ブロックも有効です。",
      sample:"（反応せず、そっと閉じるのがおすすめ）"},
    {key:"pure",label:"中身のない悪意",judge:"スルー推奨",cls:"heavy",
      test:()=>true,
      yaku:"強い不快感をぶつけたいだけで、受け取れる中身はありません。あなたの価値とは無関係です。",
      sample:"（気にしなくて大丈夫なコメントです）"},
  ];

  function maskComment(text){
    let masked=text,count=0;const cc={};
    WORDS.forEach(({w,c})=>{if(masked.indexOf(w)<0)return;const p=masked.split(w);const n=p.length-1;count+=n;cc[c]=(cc[c]||0)+n;masked=p.join(SENT+"M"+SENT);});
    return {masked,count,cc};
  }
  function findTopics(text){const f=[];TOPICS.forEach(w=>{if(text.includes(w)&&!f.some(x=>x.includes(w)||w.includes(x)))f.push(w);});return f.slice(0,6);}

  function render(){
    const text=$("inp").value;const box=$("result");
    if(!text.trim()){box.innerHTML="";return;}
    const {masked,count,cc}=maskComment(text);
    const topics=findTopics(text);
    const safe=esc(masked).split(SENT+"M"+SENT).join('<span class="masked">〇〇</span>');
    const cats=Object.keys(cc).sort((a,b)=>cc[b]-cc[a]);
    const chips=cats.length?`<div class="catchips">${cats.map(c=>`<span class="catchip">${esc(c)} ×${cc[c]}</span>`).join("")}</div>`:"";

    let html="";
    const type=TYPES.find(t=>t.test(text,cc)) || TYPES[TYPES.length-1];
    if(count===0 && topics.length===0 && type.key==="pure"){
      html=`<div class="verdict clean"><span class="vlabel">汚い言葉は見つかりませんでした</span><div class="meta">落ち着いて読めそうです。</div></div>`;
    } else {
      const vcls = count===0 ? "some" : type.cls;
      html += `<div class="verdict ${vcls}"><span class="vlabel">${esc(type.label)}</span>　— <span class="judge">${esc(type.judge)}</span>`+
        (count>0?`<div class="meta">暴言 ${count}個 を伏せました</div>${chips}`:`<div class="meta">汚い言葉はなし</div>`)+`</div>`;
      html += `<div class="blk"><span class="th">これは要は…</span>${esc(type.yaku)}</div>`;
      if(topics.length) html += `<div class="blk"><span class="th">触れていた点（拾えるとしたらここ）</span><span class="topicwords">${topics.map(esc).join(" / ")}</span> — この点だけ、改善のヒントになるか見てみて。</div>`;
      html += `<div class="blk sample"><span class="th">もし良い言い方にするなら</span><span class="body">${esc(type.sample)}</span></div>`;
    }
    html += `<div class="out-h"><span class="t">毒抜き後の本文</span></div><div class="out">${safe}</div>`;
    if(count>0) html += `<div class="raw-toggle" id="rawT">原文をそのまま見る（つらければ開かないで）</div><div class="raw" id="rawBox">${esc(text)}</div>`;
    box.innerHTML=html;
    if(count>0){const t=$("rawT");t.onclick=()=>{const r=$("rawBox");const open=r.style.display==="block";r.style.display=open?"none":"block";t.textContent=open?"原文をそのまま見る（つらければ開かないで）":"原文を隠す";};}
  }
  $("inp").addEventListener("input",render);
  $("run").onclick=render;
  $("clear").onclick=()=>{$("inp").value="";$("result").innerHTML="";$("inp").focus();};
})();
</script>
</body>
</html>

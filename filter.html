<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コメント毒抜きフィルター｜汚い言葉を見ないで済む（SNSアンチ対策）</title>
<meta name="description" content="SNSで来たアンチ・誹謗中傷コメントを貼り付けると、汚い言葉・暴言を伏せ字にして表示。暴言の数を先に教えるので、見るかどうかを自分で選べます。気分を守るための毒抜きフィルター。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23FAF9F6'/><text x='32' y='47' font-size='34' text-anchor='middle' fill='%239C6B3F' font-family='serif'>守</text></svg>">
<link rel="canonical" href="https://chiiita.github.io/iikae/filter.html">
<meta property="og:type" content="website">
<meta property="og:title" content="コメント毒抜きフィルター｜汚い言葉を見ないで済む">
<meta property="og:description" content="アンチコメントを貼ると、暴言を伏せ字に。数を先に教えるので、見るかどうか自分で選べます。気分を守るための防御ツール。">
<meta property="og:url" content="https://chiiita.github.io/iikae/filter.html">
<meta property="og:image" content="https://chiiita.github.io/iikae/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FAF9F6;--card:#FFFFFF;--ink:#1A1A1A;--ink-soft:#534E47;--sub:#8A857E;--rule:#E7E3DC;--rule-soft:#F0EDE6;
    --gold:#9C6B3F;--gold-tint:#F3EBE0;--radius:8px;--serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;--soft:#5b9b6f;--soft-tint:#EAF3EC;--warn:#C2664F;--warn-tint:#F7ECEC;}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.85;font-size:16px;letter-spacing:.012em;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .wrap{max-width:680px;margin:0 auto;padding:0 22px 90px}
  .nav{display:flex;justify-content:center;gap:18px;padding:18px 0 0;font-size:.78rem}
  .nav a{color:var(--sub);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px}
  .nav a.cur{color:var(--ink);border-color:var(--gold);font-weight:700}
  .nav a:hover{color:var(--gold)}
  header.hero{text-align:center;padding:34px 8px 18px}
  .kicker{font-size:.7rem;letter-spacing:.3em;color:var(--gold);font-weight:500;margin:0 0 14px;text-indent:.3em}
  .hero h1{font-family:var(--serif);font-weight:700;font-size:1.7rem;line-height:1.5;margin:0 0 12px;letter-spacing:.02em}
  .hero p{color:var(--ink-soft);font-size:.88rem;margin:0}
  .hr-deco{width:40px;height:1px;background:var(--gold);margin:16px auto;opacity:.7}

  .panel{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);padding:22px;margin:16px 0}
  .lbl{font-size:.8rem;color:var(--sub);font-weight:700;letter-spacing:.04em;margin:0 0 10px}
  textarea{width:100%;min-height:120px;border:1.5px solid var(--rule);border-radius:10px;padding:14px;font-size:1rem;
    font-family:var(--sans);color:var(--ink);line-height:1.8;resize:vertical;background:#fff}
  textarea::placeholder{color:#C3BDB3}
  textarea:focus{outline:none;border-color:var(--gold)}
  .row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .btn{border:1px solid var(--rule);background:#fff;border-radius:999px;padding:9px 18px;font-size:.82rem;font-family:var(--sans);
    color:var(--ink-soft);cursor:pointer;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}

  .verdict{border-radius:var(--radius);padding:16px 18px;margin:16px 0;font-size:.9rem;line-height:1.8}
  .verdict.clean{background:var(--soft-tint);border:1px solid #cfe6d7;color:#2f6b46}
  .verdict.some{background:var(--gold-tint);border:1px solid #E6D6C2;color:#7A4F2C}
  .verdict.heavy{background:var(--warn-tint);border:1px solid #ecd5cf;color:#9a3f2c}
  .verdict b{font-weight:700}
  .catchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .catchip{font-size:.72rem;background:#fff;border:1px solid var(--rule);border-radius:999px;padding:3px 10px;color:var(--ink-soft)}

  .out-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 2px 8px}
  .out-h .t{font-family:var(--serif);font-weight:700;font-size:1rem}
  .out{background:#fff;border:1px solid var(--rule);border-radius:var(--radius);padding:18px;font-size:1rem;line-height:1.95;white-space:pre-wrap;word-break:break-word}
  .masked{background:var(--rule-soft);color:#B3ABA0;border-radius:4px;padding:0 6px;font-weight:600;letter-spacing:.05em}
  .raw-toggle{font-size:.76rem;color:var(--sub);text-align:center;margin:14px 0 0;cursor:pointer;text-decoration:underline}
  .raw{display:none;background:#fff;border:1px dashed var(--rule);border-radius:var(--radius);padding:16px;margin-top:10px;
    font-size:.92rem;line-height:1.9;white-space:pre-wrap;word-break:break-word;color:var(--ink-soft)}

  .care{border:1px solid var(--rule);border-radius:var(--radius);padding:18px 20px;margin:22px 0;font-size:.82rem;color:var(--ink-soft);line-height:1.95}
  .care .h{font-family:var(--serif);color:var(--gold);font-weight:600;display:block;margin-bottom:8px;font-size:.88rem}
  .care b{color:var(--ink)}
  footer{text-align:center;color:var(--sub);font-size:.7rem;margin-top:30px;line-height:2}
  .foot-rule{width:30px;height:1px;background:var(--rule);margin:0 auto 16px}
  @media(max-width:480px){.wrap{padding:0 16px 80px}.hero h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="index.html">言い換えメーカー</a>
    <a href="filter.html" class="cur">毒抜きフィルター</a>
  </nav>

  <header class="hero">
    <p class="kicker">DOKUNUKI FILTER</p>
    <h1>コメント毒抜きフィルター</h1>
    <div class="hr-deco"></div>
    <p>アンチコメントの汚い言葉を伏せ字に。<br>暴言の数を先に伝えるので、<b>見るかどうかは自分で選べます</b>。</p>
  </header>

  <div class="panel">
    <p class="lbl">気になるコメントを貼り付け</p>
    <textarea id="inp" placeholder="ここにSNSのコメントを貼り付け…（このページから外部に送信されません。すべてあなたの端末内で処理されます）"></textarea>
    <div class="row">
      <button class="btn primary" id="run">毒抜きして見る</button>
      <button class="btn" id="clear">クリア</button>
    </div>
  </div>

  <div id="result"></div>

  <div class="care">
    <span class="h">読む前に</span>
    悪意だけの言葉は、<b>あなたの価値とは関係ありません</b>。伏せ字以外の部分に役に立つ指摘があれば拾って、なければ<b>そっと閉じてOK</b>。<br>
    つらいときは、無理に読まない・通報やブロックをする・信頼できる人に話す——どれも正しい選択です。
  </div>

  <footer>
    <div class="foot-rule"></div>
    コメント毒抜きフィルター ｜ お悩み解決ツール<br>
    すべてブラウザ内で処理され、コメントは外部に送信されません。
  </footer>
</div>

<script src="data/badwords.js"></script>
<script>
(function(){
  const $=id=>document.getElementById(id);
  const esc=s=>String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
  // 長い語から優先・重複除去
  const seen=new Set();
  const WORDS=(typeof BADWORDS!=='undefined'?BADWORDS:[]).filter(x=>{const k=x.w;if(seen.has(k))return false;seen.add(k);return !!k;})
    .sort((a,b)=>b.w.length-a.w.length);
  const SENT="␀";

  function maskComment(text){
    let masked=text, count=0; const catCount={};
    WORDS.forEach(({w,c})=>{
      if(masked.indexOf(w)<0) return;
      const parts=masked.split(w); const n=parts.length-1;
      count+=n; catCount[c]=(catCount[c]||0)+n;
      masked=parts.join(SENT+"M"+SENT);
    });
    return {masked,count,catCount};
  }
  function render(){
    const text=$("inp").value;
    const box=$("result");
    if(!text.trim()){ box.innerHTML=""; return; }
    const {masked,count,catCount}=maskComment(text);
    const total=[...text].length;
    // 判定
    let vClass,vHtml;
    if(count===0){ vClass="clean"; vHtml="<b>汚い言葉は見つかりませんでした。</b>　落ち着いて読めそうです。"; }
    else {
      const heavy = count>=3 || (count*3/Math.max(total,1))>0.25;
      vClass = heavy ? "heavy" : "some";
      vHtml = `<b>暴言を ${count}個 見つけて伏せました。</b>` + (heavy
        ? "　ほぼ悪意のコメントかもしれません。<b>無理に読まなくて大丈夫</b>です。"
        : "　一部きつい言葉を伏せました。落ち着いて読めます。");
    }
    const cats=Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a]);
    const chips=cats.length?`<div class="catchips">${cats.map(c=>`<span class="catchip">${esc(c)} ×${catCount[c]}</span>`).join("")}</div>`:"";
    // 伏せ字描画
    const safe=esc(masked).split(SENT+"M"+SENT).join('<span class="masked">〇〇</span>');
    box.innerHTML =
      `<div class="verdict ${vClass}">${vHtml}${chips}</div>`+
      `<div class="out-h"><span class="t">毒抜き後</span></div>`+
      `<div class="out">${safe}</div>`+
      (count>0?`<div class="raw-toggle" id="rawT">原文をそのまま見る（つらければ開かないで）</div><div class="raw" id="rawBox">${esc(text)}</div>`:"");
    if(count>0){ const t=$("rawT"); t.onclick=()=>{const r=$("rawBox");const open=r.style.display==="block";r.style.display=open?"none":"block";t.textContent=open?"原文をそのまま見る（つらければ開かないで）":"原文を隠す";}; }
  }
  $("inp").addEventListener("input",render);
  $("run").onclick=render;
  $("clear").onclick=()=>{$("inp").value="";$("result").innerHTML="";$("inp").focus();};
})();
</script>
</body>
</html>
